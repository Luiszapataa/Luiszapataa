<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="50%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#0a0e1a"/>
    </linearGradient>

    <!-- Neon glow filter for text -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for lines -->
    <filter id="lineGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip path -->
    <clipPath id="mainClip">
      <rect width="900" height="200" rx="0"/>
    </clipPath>

    <!-- Neon line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#00d4ff;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#00d4ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </linearGradient>

    <linearGradient id="lineGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f8fff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#4f8fff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#4f8fff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#mainClip)">

    <!-- Background -->
    <rect width="900" height="200" fill="url(#bgGrad)"/>

    <!-- Grid lines (subtle, horizontal) -->
    <line x1="0" y1="40" x2="900" y2="40" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04"/>
    <line x1="0" y1="80" x2="900" y2="80" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04"/>
    <line x1="0" y1="160" x2="900" y2="160" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04"/>

    <!-- Grid lines (subtle, vertical) -->
    <line x1="150" y1="0" x2="150" y2="200" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04"/>
    <line x1="300" y1="0" x2="300" y2="200" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04"/>
    <line x1="450" y1="0" x2="450" y2="200" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04"/>
    <line x1="600" y1="0" x2="600" y2="200" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04"/>
    <line x1="750" y1="0" x2="750" y2="200" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04"/>

    <!-- Scanning beam animation -->
    <rect x="-200" y="0" width="180" height="200" fill="url(#lineGrad2)" opacity="0.18">
      <animateTransform attributeName="transform" type="translate" from="-200 0" to="1100 0"
        dur="3.5s" repeatCount="indefinite" begin="0s"/>
    </rect>

    <!-- Top neon line with glow -->
    <line x1="0" y1="2" x2="900" y2="2" stroke="url(#lineGrad)" stroke-width="1.5" filter="url(#lineGlow)" opacity="0.8">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </line>

    <!-- Bottom neon line with glow -->
    <line x1="0" y1="198" x2="900" y2="198" stroke="url(#lineGrad)" stroke-width="1.5" filter="url(#lineGlow)" opacity="0.8">
      <animate attributeName="opacity" values="1;0.5;1" dur="2.5s" repeatCount="indefinite"/>
    </line>

    <!-- Decorative corner brackets top-left -->
    <polyline points="20,18 8,18 8,6" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
    <!-- Decorative corner brackets top-right -->
    <polyline points="880,18 892,18 892,6" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
    <!-- Decorative corner brackets bottom-left -->
    <polyline points="20,182 8,182 8,194" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
    <!-- Decorative corner brackets bottom-right -->
    <polyline points="880,182 892,182 892,194" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>

    <!-- Blinking dot left -->
    <circle cx="32" cy="100" r="3" fill="#00d4ff">
      <animate attributeName="opacity" values="1;0;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <!-- Blinking dot right -->
    <circle cx="868" cy="100" r="3" fill="#00d4ff">
      <animate attributeName="opacity" values="0;1;0" dur="1.4s" repeatCount="indefinite"/>
    </circle>

    <!-- Main name — fade in -->
    <text x="450" y="90" text-anchor="middle"
      font-family="'Courier New', Courier, monospace"
      font-size="42" font-weight="700"
      fill="#00d4ff"
      filter="url(#neonGlow)"
      letter-spacing="6">
      LUIS FELIPE ZAPATA
      <animate attributeName="opacity" values="0;0;1" dur="1.2s" fill="freeze" begin="0s"/>
    </text>

    <!-- Subtitle line -->
    <text x="450" y="124" text-anchor="middle"
      font-family="'Courier New', Courier, monospace"
      font-size="13.5" font-weight="400"
      fill="#8892b0"
      letter-spacing="4">
      BACKEND DEVELOPER  ·  JAVA &amp; SPRING BOOT  ·  C# / .NET
      <animate attributeName="opacity" values="0;0;0;1" dur="1.8s" fill="freeze" begin="0s"/>
    </text>

    <!-- Thin separator line -->
    <line x1="260" y1="138" x2="640" y2="138" stroke="#00d4ff" stroke-width="0.8" opacity="0.35"/>

    <!-- Bottom tagline -->
    <text x="450" y="158" text-anchor="middle"
      font-family="'Courier New', Courier, monospace"
      font-size="11" fill="#4a5568" letter-spacing="2">
      FUNEPE · PENÁPOLIS, SP · BRASIL 🇧🇷
      <animate attributeName="opacity" values="0;0;0;0;1" dur="2.2s" fill="freeze" begin="0s"/>
    </text>

    <!-- Flicker on name (subtle) -->
    <text x="450" y="90" text-anchor="middle"
      font-family="'Courier New', Courier, monospace"
      font-size="42" font-weight="700"
      fill="#00d4ff" opacity="0"
      letter-spacing="6">
      LUIS FELIPE ZAPATA
      <animate attributeName="opacity" values="0;0;0;0;0;0;0.15;0;0;0;0;0;0.1;0" dur="6s" repeatCount="indefinite" begin="2s"/>
    </text>

  </g>
</svg>
