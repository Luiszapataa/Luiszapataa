<svg width="340" height="220" viewBox="0 0 340 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
    <linearGradient id="cupGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8860a"/>
      <stop offset="100%" style="stop-color:#7a4f06"/>
    </linearGradient>
    <linearGradient id="coffeeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3d1f00"/>
      <stop offset="100%" style="stop-color:#1a0d00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="340" height="220" rx="12" fill="url(#bg)"/>

  <!-- Border with neon glow -->
  <rect x="1" y="1" width="338" height="218" rx="11" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner accents -->
  <polyline points="12,28 12,12 28,12" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
  <polyline points="328,28 328,12 312,12" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
  <polyline points="12,192 12,208 28,208" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
  <polyline points="328,192 328,208 312,208" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>

  <!-- Coffee cup body -->
  <path d="M120,90 L130,155 Q170,162 210,155 L220,90 Z" fill="url(#cupGrad)" opacity="0.95"/>

  <!-- Coffee liquid inside cup -->
  <path d="M124,100 L131,148 Q170,154 209,148 L216,100 Z" fill="url(#coffeeGrad)"/>

  <!-- Cup highlight -->
  <path d="M128,95 L133,105" stroke="#e8a020" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Cup handle -->
  <path d="M216,105 Q238,105 238,120 Q238,138 216,138" fill="none" stroke="url(#cupGrad)" stroke-width="6" stroke-linecap="round"/>

  <!-- Saucer -->
  <ellipse cx="170" cy="158" rx="62" ry="8" fill="#9a6504" opacity="0.8"/>
  <ellipse cx="170" cy="156" rx="58" ry="6" fill="#c8860a" opacity="0.6"/>

  <!-- Steam wisps -->
  <!-- Steam 1 -->
  <path d="M148,85 Q143,72 148,60 Q153,48 148,36" fill="none" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="2.2s" repeatCount="indefinite" begin="0s"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;-2,-8;0,0" dur="2.2s" repeatCount="indefinite" begin="0s"/>
  </path>
  <!-- Steam 2 -->
  <path d="M170,80 Q165,67 170,55 Q175,43 170,31" fill="none" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="2.2s" repeatCount="indefinite" begin="0.7s"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;2,-8;0,0" dur="2.2s" repeatCount="indefinite" begin="0.7s"/>
  </path>
  <!-- Steam 3 -->
  <path d="M192,85 Q187,72 192,60 Q197,48 192,36" fill="none" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="2.2s" repeatCount="indefinite" begin="1.4s"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;-1,-8;0,0" dur="2.2s" repeatCount="indefinite" begin="1.4s"/>
  </path>

  <!-- Java logo text -->
  <text x="170" y="186" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="11" fill="#00d4ff" letter-spacing="5" opacity="0.7">
    JAVA
  </text>

  <!-- Top label -->
  <text x="170" y="30" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="10" fill="#4a6880" letter-spacing="3">
    BACKEND DEVELOPER
  </text>

  <!-- Blinking cursor bottom right -->
  <rect x="308" y="196" width="8" height="2" fill="#00d4ff">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
